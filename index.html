<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠 생일 게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #0f0f1a;
            --border: #2a2a4a;
            --cyan: #00f5ff;
            --yellow: #ffd700;
            --magenta: #ff00aa;
            --green: #39ff14;
            --red: #ff2244;
            --white: #e8e8f0;
            --dim: #4a4a6a;
            --glow-cyan: 0 0 8px #00f5ff, 0 0 20px rgba(0,245,255,0.4);
            --glow-yellow: 0 0 8px #ffd700, 0 0 20px rgba(255,215,0,0.4);
            --glow-green: 0 0 8px #39ff14, 0 0 20px rgba(57,255,20,0.4);
            --glow-magenta: 0 0 8px #ff00aa, 0 0 20px rgba(255,0,170,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'VT323', monospace;
            font-size: 22px;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: crosshair;
        }
        /* Scanlines */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
            pointer-events: none; z-index: 9999;
        }
        /* CRT vignette */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
            pointer-events: none; z-index: 9998;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }
        #app { position: relative; z-index: 10; }

        /* Audio Toggle */
        #audio-toggle {
            position: fixed; top: 14px; left: 16px;
            z-index: 9997;
            background: rgba(10,10,15,0.92);
            border: 1px solid var(--border);
            padding: 7px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px; color: var(--dim);
            cursor: pointer; letter-spacing: 1px;
            transition: color 0.2s, border-color 0.2s;
        }
        #audio-toggle:hover { color: var(--cyan); border-color: var(--cyan); }
        #audio-toggle.on { color: var(--green); border-color: var(--green); text-shadow: var(--glow-green); }

        .pixel { font-family: 'Press Start 2P', monospace; line-height: 1.6; }
        .pixel-sm { font-family: 'Press Start 2P', monospace; font-size: 10px; line-height: 1.8; }
        .pixel-xs { font-family: 'Press Start 2P', monospace; font-size: 8px; line-height: 2; }

        .panel { background: var(--panel); border: 2px solid var(--border); position: relative; }
        .panel::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,245,255,0.03) 0%,transparent 60%); pointer-events:none; }

        .bracketed { position: relative; }
        .bracketed::before,.bracketed::after,.bracketed>.bracket-bl,.bracketed>.bracket-br {
            content:''; position:absolute; width:14px; height:14px; border-color:var(--cyan); border-style:solid;
        }
        .bracketed::before { top:-2px; left:-2px; border-width:2px 0 0 2px; }
        .bracketed::after  { top:-2px; right:-2px; border-width:2px 2px 0 0; }
        .bracketed>.bracket-bl { bottom:-2px; left:-2px; border-width:0 0 2px 2px; }
        .bracketed>.bracket-br { bottom:-2px; right:-2px; border-width:0 2px 2px 0; }

        .btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px; padding: 14px 28px;
            background: transparent; border: 2px solid var(--cyan);
            color: var(--cyan); text-shadow: var(--glow-cyan);
            box-shadow: var(--glow-cyan), inset 0 0 20px rgba(0,245,255,0.05);
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.15s; position: relative; overflow: hidden;
        }
        .btn::before { content:''; position:absolute; inset:0; background:var(--cyan); opacity:0; transition:opacity 0.15s; }
        .btn:hover::before { opacity: 0.1; }
        .btn:hover { box-shadow:0 0 16px var(--cyan),0 0 40px rgba(0,245,255,0.5),inset 0 0 20px rgba(0,245,255,0.1); transform:translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-yellow { border-color:var(--yellow); color:var(--yellow); text-shadow:var(--glow-yellow); box-shadow:var(--glow-yellow),inset 0 0 20px rgba(255,215,0,0.05); }
        .btn-yellow::before { background:var(--yellow); }
        .btn-yellow:hover { box-shadow:0 0 16px var(--yellow),0 0 40px rgba(255,215,0,0.5),inset 0 0 20px rgba(255,215,0,0.1); }
        .btn-green { border-color:var(--green); color:var(--green); text-shadow:var(--glow-green); box-shadow:var(--glow-green),inset 0 0 20px rgba(57,255,20,0.05); }
        .btn-green:hover { box-shadow:0 0 16px var(--green),0 0 40px rgba(57,255,20,0.5); }
        .btn-magenta { border-color:var(--magenta); color:var(--magenta); text-shadow:var(--glow-magenta); box-shadow:var(--glow-magenta); }
        .btn-magenta:hover { box-shadow:0 0 16px var(--magenta),0 0 40px rgba(255,0,170,0.5); }
        .btn-full { width: 100%; }

        .choice-btn {
            font-family: 'VT323', monospace; font-size: 24px;
            padding: 12px 24px; background: transparent;
            border: 1px solid var(--dim); color: var(--white);
            cursor: pointer; width: 100%; text-align: left;
            transition: all 0.12s; letter-spacing: 1px; position: relative;
        }
        .choice-btn::before { content:'▶ '; color:var(--cyan); opacity:0; transition:opacity 0.12s; }
        .choice-btn:hover { border-color:var(--cyan); color:var(--cyan); background:rgba(0,245,255,0.05); padding-left:36px; }
        .choice-btn:hover::before { opacity: 1; }

        .retro-input {
            width: 100%; background: rgba(0,245,255,0.04);
            border: 1px solid var(--dim); border-bottom: 2px solid var(--cyan);
            color: var(--cyan); font-family: 'VT323', monospace;
            font-size: 28px; padding: 12px 16px; text-align: center;
            letter-spacing: 8px; outline: none; caret-color: var(--cyan);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .retro-input:focus { border-color:var(--cyan); box-shadow:var(--glow-cyan); }
        .retro-input::placeholder { color:var(--dim); letter-spacing:4px; }

        .hearts-hud {
            position: fixed; top: 50%; right: 20px;
            transform: translateY(-50%);
            z-index: 9997;
            background: rgba(10,10,15,0.92);
            border: 1px solid var(--border);
            padding: 14px 10px;
            display: flex; flex-direction: column; gap: 2px; font-size: 22px;
        }
        .hearts-hud .hud-label { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--dim); text-align:center; margin-bottom:6px; letter-spacing:1px; }

        .progress-track { width:100%; height:6px; background:var(--border); position:relative; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--magenta)); box-shadow:var(--glow-cyan); transition:width 0.4s ease; }

        .marquee-wrap { overflow:hidden; border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:8px 0; background:rgba(0,245,255,0.03); }
        .marquee-inner { display:inline-block; white-space:nowrap; animation:marquee 18s linear infinite; font-family:'VT323',monospace; font-size:20px; color:var(--dim); letter-spacing:2px; }
        @keyframes marquee { from{transform:translateX(100vw)} to{transform:translateX(-100%)} }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .blink { animation: blink 1s step-end infinite; }

        @keyframes glitch1 {
            0%,100%{clip-path:inset(0 0 95% 0);transform:translate(-3px,0)}
            20%{clip-path:inset(30% 0 50% 0);transform:translate(3px,0)}
            40%{clip-path:inset(70% 0 10% 0);transform:translate(-3px,0)}
        }
        @keyframes glitch2 {
            0%,100%{clip-path:inset(50% 0 30% 0);transform:translate(3px,0)}
            30%{clip-path:inset(10% 0 80% 0);transform:translate(-3px,0)}
        }
        .glitch-wrap { position:relative; display:inline-block; }
        .glitch-wrap::before,.glitch-wrap::after { content:attr(data-text); position:absolute; inset:0; font-family:inherit; font-size:inherit; }
        .glitch-wrap::before { color:var(--cyan); animation:glitch1 4s infinite; opacity:0.7; }
        .glitch-wrap::after  { color:var(--magenta); animation:glitch2 4s 0.5s infinite; opacity:0.5; }

        @keyframes float-up { 0%{transform:translateY(100vh) rotate(0deg);opacity:0.15} 50%{opacity:0.08} 100%{transform:translateY(-20vh) rotate(360deg);opacity:0} }
        .float-emoji { position:absolute; animation:float-up linear infinite; pointer-events:none; font-size:28px; opacity:0.12; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,50%,90%{transform:translateX(-12px)} 30%,70%{transform:translateX(12px)} }
        .shake { animation: shake 0.4s infinite; }

        @keyframes credits { from{transform:translateY(100vh)} to{transform:translateY(-120%)} }
        .credits-roll { animation: credits linear forwards; }

        @keyframes money-fall { 0%{transform:translateY(-120px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0.6} }
        .money-fall { position:absolute; animation:money-fall linear infinite; pointer-events:none; font-size:48px; }

        @keyframes scanflash { 0%{opacity:0} 10%{opacity:0.5} 100%{opacity:0} }
        .scan-flash { position:fixed; inset:0; background:rgba(0,245,255,0.06); pointer-events:none; z-index:9996; animation:scanflash 0.6s ease-out forwards; }

        @keyframes redflash { 0%{opacity:0} 10%{opacity:0.45} 100%{opacity:0} }
        .red-flash { position:fixed; inset:0; background:rgba(255,20,20,0.12); pointer-events:none; z-index:9996; animation:redflash 0.5s ease-out forwards; }

        .screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .container { max-width:680px; width:100%; }
        .q-counter { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--dim); letter-spacing:2px; }
        .q-counter span { color:var(--yellow); }
        .fail-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; background:#0a0005; }
        .pixel-dots { display:flex; gap:6px; justify-content:center; margin:8px 0; }
        .pixel-dot { width:6px; height:6px; background:var(--dim); }
        .pixel-dot.active { background:var(--cyan); box-shadow:var(--glow-cyan); }
        .stat-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(42,42,74,0.5); font-size:19px; }
        .stat-row:last-child { border-bottom:none; }
        .stat-label { color:var(--dim); }
        .stat-val { color:var(--cyan); font-family:'Press Start 2P',monospace; font-size:10px; }
        .gift-amount { font-family:'Press Start 2P',monospace; font-size:28px; color:var(--yellow); text-shadow:var(--glow-yellow); line-height:1.6; }
    </style>
</head>
<body>
<div class="grid-bg"></div>
<button id="audio-toggle" onclick="toggleAudio()">♪ BGM: OFF</button>
<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════════
   RETRO CHIPTUNE AUDIO ENGINE  —  Web Audio API only
   No external files. Pure synthesized 8-bit sound.
═══════════════════════════════════════════════════ */
let _ctx = null;
let bgmPlaying = false;
let bgmOscNodes = [];
let audioEnabled = false;

function getCtx() {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
}

/* ─ tiny utility: schedule an oscillator shot ─ */
function shot(freq, type, start, dur, vol, pitchEnd) {
    if (!audioEnabled) return;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    if (pitchEnd) osc.frequency.exponentialRampToValueAtTime(pitchEnd, start + dur);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(start); osc.stop(start + dur + 0.01);
    return osc;
}

/* ─ noise burst ─ */
function noise(start, dur, vol, hipass) {
    if (!audioEnabled) return;
    const ctx = getCtx();
    const n = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    const filt = ctx.createBiquadFilter();
    const g = ctx.createGain();
    filt.type = hipass ? 'highpass' : 'bandpass';
    filt.frequency.value = hipass || 1000;
    filt.Q.value = 0.5;
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.buffer = buf;
    src.connect(filt); filt.connect(g); g.connect(ctx.destination);
    src.start(start); src.stop(start + dur + 0.01);
    return src;
}

/* ══════════════════════
   SOUND EFFECTS
══════════════════════ */
function sfxClick() {
    const t = getCtx().currentTime;
    shot(880,'square',t,0.06,0.08);
    shot(1320,'square',t+0.03,0.04,0.05);
}
function sfxHover() {
    const t = getCtx().currentTime;
    shot(520,'sine',t,0.05,0.04);
}
function sfxCoin() {
    const t = getCtx().currentTime;
    shot(1200,'square',t,0.04,0.06);
    shot(1800,'sine',t+0.03,0.06,0.07);
}
function sfxCorrect() {
    const t = getCtx().currentTime;
    [523,659,784,1047].forEach((f,i) => shot(f,'square',t+i*0.07,0.13,0.1));
    shot(1047,'sine',t+0.32,0.22,0.08,2093);
}
function sfxWrong() {
    const t = getCtx().currentTime;
    shot(440,'sawtooth',t,0.32,0.14,110);
    noise(t,0.28,0.06,false);
}
function sfxLifeLost() {
    const t = getCtx().currentTime;
    shot(660,'square',t,0.12,0.1);
    shot(523,'square',t+0.1,0.12,0.1);
    shot(415,'square',t+0.2,0.2,0.12);
}
function sfxGameOver() {
    const t = getCtx().currentTime;
    [440,349,311,261].forEach((f,i) => {
        shot(f,'sawtooth',t+i*0.28,0.38,0.15);
        noise(t+i*0.28,0.1,0.05,false);
    });
    shot(261,'sawtooth',t+1.15,0.9,0.1,55);
}
function sfxLevelUp() {
    const t = getCtx().currentTime;
    const seq = [523,659,784,1047,1319,1047,1319,1568];
    seq.forEach((f,i) => shot(f,'square',t+i*0.08,0.15,0.09));
}
function sfxFanfare() {
    const t = getCtx().currentTime;
    const mel = [[523,0],[659,0.1],[784,0.2],[1047,0.3],[784,0.52],[1047,0.66],[1319,0.82],[1568,1.0],[1319,1.22],[1047,1.37],[1319,1.52],[1568,1.72]];
    mel.forEach(([f,dt]) => shot(f,'square',t+dt,0.22,0.1));
    [[659,0],[784,0.1],[1047,0.3]].forEach(([f,dt]) => shot(f,'triangle',t+dt,0.16,0.06));
}
function sfxCreditsStart() {
    const t = getCtx().currentTime;
    shot(200,'sine',t,0.65,0.1,800);
    shot(150,'triangle',t,0.85,0.07,600);
}
function sfxCoinShower() {
    const t = getCtx().currentTime;
    for (let i = 0; i < 14; i++)
        shot(800+Math.random()*1400,'square',t+i*0.07,0.06,0.07);
}
function sfxType() {
    if (!audioEnabled) return;
    const t = getCtx().currentTime;
    shot(600+Math.random()*220,'square',t,0.03,0.04);
}

/* ══════════════════════════════════════════════
   BACKGROUND MUSIC
   3-layer chiptune: lead (square) + bass (triangle) + arp (pulse)
   + percussive hi-hat + kick synthesis
   Loops indefinitely using JS scheduler
══════════════════════════════════════════════ */
const BPM  = 140;
const BEAT = 60 / BPM;
const BAR  = BEAT * 4;

// Frequency helpers
const hz = (midi) => 440 * Math.pow(2, (midi - 69) / 12);
// MIDI notes: C4=60, D4=62, E4=64, F4=65, G4=67, A4=69, B4=71
const C3=hz(48),D3=hz(50),E3=hz(52),F3=hz(53),G3=hz(55),A3=hz(57),B3=hz(59),
      C4=hz(60),D4=hz(62),E4=hz(64),F4=hz(65),G4=hz(67),A4=hz(69),B4=hz(71),
      C5=hz(72),D5=hz(74),E5=hz(76),F5=hz(77),G5=hz(79),A5=hz(81),B5=hz(83),
      C6=hz(84);

// Lead melody — 8-bar pattern (beats as durations)
const LEAD_SEQ = [
    [C5,1],[E5,0.5],[G5,0.5],[E5,1],[C5,1],       // bar 1
    [D5,1],[F5,0.5],[A5,0.5],[F5,1],[D5,1],         // bar 2
    [E5,1],[G5,0.5],[B5,0.5],[G5,1],[E5,1],         // bar 3
    [G5,2],[E5,1],[C5,1],                            // bar 4
    [A5,0.5],[G5,0.5],[F5,0.5],[E5,0.5],[D5,1],[C5,1], // bar 5
    [B4,0.5],[C5,0.5],[D5,0.5],[E5,0.5],[F5,1],[G5,1], // bar 6
    [A5,1],[G5,0.5],[F5,0.5],[E5,1],[D5,1],          // bar 7
    [C5,3],[C5,1],                                    // bar 8
];

// Bass — 8-bar root/fifth pulse
const BASS_SEQ = [
    [C3,0.5],[C3,0.5],[G3,0.5],[C3,0.5],
    [F3,0.5],[F3,0.5],[C3,0.5],[G3,0.5],
    [G3,0.5],[G3,0.5],[D3,0.5],[G3,0.5],
    [C3,0.5],[G3,0.5],[E3,0.5],[C3,0.5],
    [F3,0.5],[C3,0.5],[F3,0.5],[A3,0.5],
    [G3,0.5],[D3,0.5],[G3,0.5],[B3,0.5],
    [C3,0.5],[G3,0.5],[E3,0.5],[C3,0.5],
    [C3,0.5],[C3,0.25],[G3,0.25],[C3,0.5],[C3,0.5],
];

// Arp chords — one per bar
const ARP = [
    [C4,E4,G4],[F4,A4,C5],[G4,B4,D5],[C4,E4,G4],
    [A3,C4,E4],[D4,F4,A4],[G3,B3,D4],[C4,E4,G4],
];

function bgmShot(freq, type, start, dur, vol) {
    if (!bgmPlaying) return;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.008);
    g.gain.setValueAtTime(vol, start + dur * 0.75);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(start); osc.stop(start + dur + 0.01);
    bgmOscNodes.push(osc);
}

function scheduleBGMLoop(loopStart) {
    if (!bgmPlaying) return;
    const ctx = getCtx();

    // ── Lead ──
    let t = loopStart;
    LEAD_SEQ.forEach(([f, beats]) => {
        const dur = beats * BEAT;
        bgmShot(f, 'square', t, dur * 0.82, 0.055);
        t += dur;
    });

    // ── Bass ──
    t = loopStart;
    BASS_SEQ.forEach(([f, beats]) => {
        const dur = beats * BEAT;
        bgmShot(f, 'triangle', t, dur * 0.7, 0.07);
        t += dur;
    });

    // ── Arp (triplet 16th sweep per beat) ──
    ARP.forEach((chord, barIdx) => {
        const bStart = loopStart + barIdx * BAR;
        const step = BEAT / 3;
        for (let beat = 0; beat < 4; beat++) {
            chord.forEach((note, ni) => {
                bgmShot(note, 'square', bStart + beat * BEAT + ni * step, step * 0.65, 0.022);
            });
        }
    });

    // ── Hi-hat (noise, every half-beat) ──
    for (let i = 0; i < 32; i++) {
        const ht = loopStart + i * (BEAT / 2);
        if (!bgmPlaying) break;
        const n2 = Math.floor(ctx.sampleRate * 0.038);
        const buf = ctx.createBuffer(1, n2, ctx.sampleRate);
        const dd = buf.getChannelData(0);
        for (let j = 0; j < n2; j++) dd[j] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        const flt = ctx.createBiquadFilter();
        const gg  = ctx.createGain();
        flt.type = 'highpass'; flt.frequency.value = 7000;
        const hhVol = (i % 2 === 0) ? 0.035 : 0.018;
        gg.gain.setValueAtTime(hhVol, ht);
        gg.gain.exponentialRampToValueAtTime(0.0001, ht + 0.038);
        src.buffer = buf;
        src.connect(flt); flt.connect(gg); gg.connect(ctx.destination);
        src.start(ht); src.stop(ht + 0.045);
        bgmOscNodes.push(src);
    }

    // ── Kick (beats 1 & 3 of each bar) ──
    for (let bar = 0; bar < 8; bar++) {
        [0, 2].forEach(beat => {
            if (!bgmPlaying) return;
            const kt = loopStart + bar * BAR + beat * BEAT;
            const ko = ctx.createOscillator();
            const kg = ctx.createGain();
            ko.frequency.setValueAtTime(160, kt);
            ko.frequency.exponentialRampToValueAtTime(38, kt + 0.12);
            kg.gain.setValueAtTime(0.28, kt);
            kg.gain.exponentialRampToValueAtTime(0.0001, kt + 0.2);
            ko.connect(kg); kg.connect(ctx.destination);
            ko.start(kt); ko.stop(kt + 0.22);
            bgmOscNodes.push(ko);
        });
    }

    // ── Snare (beat 2 & 4 of bars 2,4,6,8) ──
    [1,3,5,7].forEach(barIdx => {
        [1,3].forEach(beat => {
            if (!bgmPlaying) return;
            const st2 = loopStart + barIdx * BAR + beat * BEAT;
            const sn = Math.floor(ctx.sampleRate * 0.09);
            const sbuf = ctx.createBuffer(1, sn, ctx.sampleRate);
            const sd = sbuf.getChannelData(0);
            for (let j = 0; j < sn; j++) sd[j] = Math.random() * 2 - 1;
            const ssrc = ctx.createBufferSource();
            const sflt = ctx.createBiquadFilter();
            const sgg  = ctx.createGain();
            sflt.type = 'bandpass'; sflt.frequency.value = 1800; sflt.Q.value = 0.4;
            sgg.gain.setValueAtTime(0.07, st2);
            sgg.gain.exponentialRampToValueAtTime(0.0001, st2 + 0.09);
            ssrc.buffer = sbuf;
            ssrc.connect(sflt); sflt.connect(sgg); sgg.connect(ctx.destination);
            ssrc.start(st2); ssrc.stop(st2 + 0.1);
            bgmOscNodes.push(ssrc);
        });
    });

    // Schedule next loop
    const loopLen = 8 * BAR;
    const msUntil = (loopStart + loopLen - ctx.currentTime - 0.08) * 1000;
    setTimeout(() => {
        if (bgmPlaying) scheduleBGMLoop(loopStart + loopLen);
    }, Math.max(0, msUntil));
}

function startBGM() {
    if (!audioEnabled || bgmPlaying) return;
    bgmPlaying = true;
    scheduleBGMLoop(getCtx().currentTime + 0.1);
}
function stopBGM() {
    bgmPlaying = false;
    bgmOscNodes.forEach(n => { try { n.stop(); } catch(e){} });
    bgmOscNodes = [];
}

/* ══════════════════════════════════════════════
   BIRTHDAY BGM  —  Happy Birthday chiptune
   Warmer waltz (3/4), triangle lead + sine harmony
══════════════════════════════════════════════ */
const BD_BPM  = 96;
const BD_BEAT = 60 / BD_BPM;
const BD_BAR  = BD_BEAT * 3;

const BD_LEAD = [
    [G4,0.75],[G4,0.25],[A4,1],[G4,1],[C5,1],[B4,2],
    [G4,0.75],[G4,0.25],[A4,1],[G4,1],[D5,1],[C5,2],
    [G4,0.75],[G4,0.25],[G5,1],[E5,1],[C5,1],[B4,1],[A4,2],
    [F5,0.75],[F5,0.25],[E5,1],[C5,1],[D5,1],[C5,2],
];
const BD_HARM = [
    [E4,0.75],[E4,0.25],[F4,1],[E4,1],[A4,1],[G4,2],
    [E4,0.75],[E4,0.25],[F4,1],[E4,1],[B4,1],[A4,2],
    [E4,0.75],[E4,0.25],[E5,1],[C5,1],[A4,1],[G4,1],[F4,2],
    [D5,0.75],[D5,0.25],[C5,1],[A4,1],[B4,1],[A4,2],
];
const BD_BASS_ROOTS = [C3,C3,G3,C3, C3,C3,G3,C3, C3,C3,G3,C3, F3,C3,G3,C3];
const BD_BELLS = [
    [C4,E4,G4],[C4,E4,G4],[G3,B3,D4],[C4,E4,G4],
    [C4,E4,G4],[C4,E4,G4],[G3,B3,D4],[C4,E4,G4],
    [C4,E4,G4],[C4,E4,G4],[G3,B3,D4],[C4,E4,G4],
    [F3,A3,C4],[C4,E4,G4],[G3,B3,D4],[C4,E4,G4],
];

let bdPlaying = false;
let bdNodes = [];

function bdShot(freq, type, start, dur, vol) {
    if (!bdPlaying) return;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.01);
    g.gain.setValueAtTime(vol, start + dur * 0.8);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(start); osc.stop(start + dur + 0.02);
    bdNodes.push(osc);
}

function scheduleBDLoop(loopStart) {
    if (!bdPlaying) return;
    const ctx = getCtx();
    const totalBars = 16;
    let t = loopStart;
    BD_LEAD.forEach(([f, beats]) => { const dur = beats * BD_BEAT; bdShot(f,'triangle',t,dur*0.88,0.09); t+=dur; });
    t = loopStart;
    BD_HARM.forEach(([f, beats]) => { const dur = beats * BD_BEAT; bdShot(f,'sine',t,dur*0.85,0.05); t+=dur; });
    for (let bar=0; bar<totalBars; bar++)
        bdShot(BD_BASS_ROOTS[bar % BD_BASS_ROOTS.length],'triangle',loopStart+bar*BD_BAR,BD_BAR*0.7,0.07);
    BD_BELLS.forEach((chord,barIdx) => {
        const bStart = loopStart + barIdx * BD_BAR;
        chord.forEach((note,ni) => bdShot(note,'square',bStart+ni*BD_BEAT,BD_BEAT*0.55,0.018));
    });
    for (let bar=0; bar<totalBars; bar++) {
        if (!bdPlaying) break;
        const kt = loopStart + bar * BD_BAR;
        const ko = ctx.createOscillator(); const kg = ctx.createGain();
        ko.frequency.setValueAtTime(120,kt); ko.frequency.exponentialRampToValueAtTime(35,kt+0.1);
        kg.gain.setValueAtTime(0.18,kt); kg.gain.exponentialRampToValueAtTime(0.0001,kt+0.18);
        ko.connect(kg); kg.connect(ctx.destination); ko.start(kt); ko.stop(kt+0.2);
        bdNodes.push(ko);
    }
    for (let bar=0; bar<totalBars; bar++)
        [1,2].forEach(beat => { if(bdPlaying) bdShot(hz(81+beat*2),'sine',loopStart+bar*BD_BAR+beat*BD_BEAT,0.08,0.025); });

    const loopLen = totalBars * BD_BAR;
    const msUntil = (loopStart + loopLen - ctx.currentTime - 0.08) * 1000;
    setTimeout(() => { if (bdPlaying) scheduleBDLoop(loopStart + loopLen); }, Math.max(0, msUntil));
}

function startBirthdayBGM() {
    if (!audioEnabled) return;
    stopBGM();
    bdPlaying = false;
    bdNodes.forEach(n => { try { n.stop(); } catch(e){} });
    bdNodes = [];
    bdPlaying = true;
    scheduleBDLoop(getCtx().currentTime + 0.15);
}

function toggleAudio() {
    const btn = document.getElementById('audio-toggle');
    if (!audioEnabled) {
        audioEnabled = true;
        getCtx().resume();
        btn.textContent = '♪ BGM: ON';
        btn.classList.add('on');
        startBGM();
        setTimeout(() => sfxLevelUp(), 80);
    } else {
        audioEnabled = false;
        stopBGM();
        btn.textContent = '♪ BGM: OFF';
        btn.classList.remove('on');
    }
}

/* Auto-start BGM on first user interaction (browsers require gesture) */
function autoStartAudio() {
    if (audioEnabled) return;
    audioEnabled = true;
    getCtx().resume();
    startBGM();
    const btn = document.getElementById('audio-toggle');
    if (btn) { btn.textContent = '♪ BGM: ON'; btn.classList.add('on'); }
    document.removeEventListener('click', autoStartAudio);
    document.removeEventListener('keydown', autoStartAudio);
    document.removeEventListener('touchstart', autoStartAudio);
}
document.addEventListener('click', autoStartAudio);
document.addEventListener('keydown', autoStartAudio);
document.addEventListener('touchstart', autoStartAudio);

                <div class="pixel" style="font-size:10px;color:var(--yellow);text-shadow:var(--glow-yellow);margin-bottom:20px;">생일 선물 🎁</div>
                <div class="gift-amount">💰 100,000원 💰</div>
                <div style="margin:28px 0;height:1px;background:linear-gradient(90deg,transparent,var(--yellow),transparent);"></div>
                <div style="font-size:20px;color:var(--white);line-height:1.7;margin-bottom:20px;">
                    주의: 아빠만을 위한 선물을 사세요!<br>
                    아빠 외 가족이나 타인을 위한 거에 쓰면<br>
                    <span style="color:var(--red);">소멸됩니다!</span>
                </div>
                <div style="font-size:24px;color:var(--cyan);text-shadow:var(--glow-cyan);">사랑합니다 아빠! ❤️</div>
            </div>
        </div></div>`;
    }
    return '';
}

/* ─ ACTIONS ─ */
function onHoverTitle() {
    if (!state.hoverText) sfxHover();
    state.hoverText = true; state.showButtons = true; render();
}
function handleNoProximity(e) {
    if (state.hearts <= 0) return;
    sfxWrong();
    const r = e.target.getBoundingClientRect();
    state.noButtonPos = {
        x: Math.min(Math.random()*window.innerWidth, window.innerWidth-r.width-20),
        y: Math.min(Math.random()*window.innerHeight, window.innerHeight-r.height-20)
    };
    state.yesButtonScale += 0.25;
    state.hearts = Math.max(0, state.hearts-1);
    if (state.hearts===0) { sfxGameOver(); setTimeout(()=>{state.screen='fail';render();},500); }
    else { sfxLifeLost(); render(); }
}
function handleNoClick() { sfxWrong(); alert('오류: 다시 생각해보세요!'); }
function handleYesClick() { sfxLevelUp(); state.screen='game'; render(); flashScan(); }
function handleAnswer(q, ans) {
    sfxClick();
    if (ans === CORRECT_ANSWERS[q]) {
        sfxCorrect(); flashScan();
        if (q===9) { setTimeout(()=>sfxFanfare(),400); state.showCongratsButton=true; }
        else { state.currentQuestion=q+1; }
        render();
    } else {
        sfxWrong(); flashRed();
        state.hearts = Math.max(0, state.hearts-1);
        if (state.hearts===0) { sfxGameOver(); setTimeout(()=>{state.screen='fail';render();},500); }
        else { sfxLifeLost(); render(); }
    }
}
function submitQ0() {
    const inp = document.getElementById('q0-input');
    if (inp) state.q0Answer = inp.value;
    handleAnswer(0, state.q0Answer);
}
function doShowMsg() {
    sfxCreditsStart();
    startBirthdayBGM();
    state.screen='success'; state.showMessage=true; render();
    setTimeout(()=>{state.creditsFinished=true;render();}, MESSAGE_DURATION);
}
function doShowGiftMsg() { sfxCoinShower(); state.showGiftMessage=true; render(); }
function doShowGiftDetails() {
    sfxCoinShower(); setTimeout(()=>sfxCoinShower(),400);
    state.showGiftDetails=true; render();
}

function flashScan() {
    const d=document.createElement('div'); d.className='scan-flash';
    document.body.appendChild(d); setTimeout(()=>d.remove(),700);
}
function flashRed() {
    const d=document.createElement('div'); d.className='red-flash';
    document.body.appendChild(d); setTimeout(()=>d.remove(),600);
}

/* ─ RENDER ─ */
function render() {
    const app = document.getElementById('app');
    if (state.screen==='landing')      app.innerHTML = renderLanding();
    else if (state.screen==='game')    {
        app.innerHTML = renderGame();
        const inp = document.getElementById('q0-input');
        if (inp) {
            inp.addEventListener('input', e=>state.q0Answer=e.target.value);
            inp.addEventListener('keydown', e=>{ if(e.key==='Enter') submitQ0(); });
        }
    }
    else if (state.screen==='fail')    app.innerHTML = renderFail();
    else if (state.screen==='success') app.innerHTML = renderSuccess();
}

initFloatingEmojis();
render();
</script>
</body>
</html>
